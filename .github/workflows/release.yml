name: Release

on:
  push:
    tags:
      - "v*.*.*"
      - "v*.*.*-*" # prerelease tags like v0.1.0-rc1

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

permissions:
  contents: write # needed to create a GitHub Release and upload assets

jobs:
  # -------------------------------------------------------------------
  # Build release binaries for each target and package them as tarballs.
  # Both matrix jobs upload to the same GitHub Release keyed by tag.
  # -------------------------------------------------------------------
  build-release:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-gnu
            os: ubuntu-latest
          - target: aarch64-apple-darwin
            os: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable with target)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: release-${{ matrix.target }}

      - name: Build release binaries
        run: cargo build --release --workspace --target ${{ matrix.target }}

      - name: Verify binary size (<10MB each)
        run: |
          chmod +x scripts/check-binary-size.sh
          ./scripts/check-binary-size.sh "target/${{ matrix.target }}/release"

      - name: Package tarball
        id: package
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TARGET="${{ matrix.target }}"
          ARCHIVE_DIR="logdive-${VERSION}-${TARGET}"
          ARCHIVE_FILE="${ARCHIVE_DIR}.tar.gz"

          mkdir -p "${ARCHIVE_DIR}"
          cp "target/${TARGET}/release/logdive"     "${ARCHIVE_DIR}/"
          cp "target/${TARGET}/release/logdive-api" "${ARCHIVE_DIR}/"
          cp README.md CHANGELOG.md LICENSE-MIT LICENSE-APACHE "${ARCHIVE_DIR}/"

          tar -czf "${ARCHIVE_FILE}" "${ARCHIVE_DIR}"

          echo "archive_file=${ARCHIVE_FILE}" >> "$GITHUB_OUTPUT"
          echo "archive_dir=${ARCHIVE_DIR}"   >> "$GITHUB_OUTPUT"

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ steps.package.outputs.archive_file }}
          body: |
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/${{ github.ref_name }}/CHANGELOG.md) for release notes.

            ## Install

            ### From crates.io
            ```
            cargo install logdive logdive-api
            ```

            ### Prebuilt binaries

            Download the archive for your platform above, extract it, and place `logdive` and `logdive-api` on your `PATH`.
            draft: false
            # Mark as prerelease if the tag contains a hyphen (e.g. v0.1.0-rc1).
            prerelease: ${{ contains(github.ref_name, '-') }}
            fail_on_unmatched_files: true
