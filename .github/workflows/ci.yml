name: CI

on:
  push:
    branches: [main]
  pull_request:

# Cancel in-flight runs on the same branch when a new commit lands.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1

jobs:
  # -------------------------------------------------------------------
  # Full build + test on stable across our release platforms.
  # -------------------------------------------------------------------
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
          - macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Build (workspace, all targets)
        run: cargo build --workspace --all-targets --verbose

      - name: Test
        run: cargo test --workspace --all-targets --verbose

  # -------------------------------------------------------------------
  # MSRV check: ensures our code still compiles on the declared minimum
  # Rust version (1.85, matching `rust-version` in the workspace manifest).
  # -------------------------------------------------------------------
  msrv:
    name: MSRV (Rust 1.85)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust 1.85
        uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.85"

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: msrv

      - name: Build
        run: cargo build --workspace --verbose

  # -------------------------------------------------------------------
  # Lints: clippy at zero-warning strictness + rustfmt.
  # -------------------------------------------------------------------
  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust (stable with clippy + rustfmt)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache Cargo artifacts
        uses: Swatinem/rust-cache@v2
        with:
          key: lint

      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Format check
        run: cargo fmt --all --check
